# METABEGIN
# X-Env-Layer-Name: ghostcam
# X-Env-Layer-Desc: Ghostcam camera agent with GPS, cellular, and audio support.
# X-Env-Layer-Version: 1.0.0
# X-Env-Layer-Category: app-misc
# X-Env-Layer-Requires: openssh-server
# METAEND
---
mmdebstrap:
  packages:
    # Most runtime deps are now declared in the .deb's Depends and
    # resolved automatically when dpkg -i runs the deb under apt. The
    # short list below covers tools we want available even without
    # the deb installed (debugging) and image-only utilities (htop).
    - jq
    - curl
    - htop
    # USB gadget onboarding link (#144): dnsmasq serves DHCP/DNS on usb0,
    # dosfstools (mkfs.vfat) builds the mass-storage redirect volume.
    - dnsmasq
    - dosfstools

  customize-hooks:
    # Install ghostcam-camera .deb. apt resolves Depends (ffmpeg,
    # network-manager, modemmanager, libqmi-utils, usb-modeswitch,
    # gpsd, gpsd-clients, rpicam-apps, libzbar0, alsa-utils,
    # ca-certificates, adduser) from the rootfs's package cache.
    # The .deb's postinst creates the ghostcam user, /var/ghostcam,
    # /etc/ghostcam/env, and enables ghostcam-camera.service.
    - cp pkgs/ghostcam-camera_*.deb "$1/tmp/"
    - chroot "$1" sh -c 'apt-get update && apt-get install -y --no-install-recommends /tmp/ghostcam-camera_*.deb'
    - rm "$1"/tmp/ghostcam-camera_*.deb

    # Overwrite the deb's seeded env with the image-specific one
    # (carries GHOSTCAM_VIDEO_PROFILE=<device>, set by pi-images.yml).
    - cp files/ghostcam.env "$1/etc/ghostcam/env"

    # GPS service — image-only (the .deb doesn't ship the GPS unit
    # because GPS is hardware-specific to the SIM7600 modem hat).
    - cp files/ghostcam-gps.service "$1/etc/systemd/system/"
    - cp files/ghostcam-enable-gps.sh "$1/usr/local/bin/"
    - chmod 755 "$1/usr/local/bin/ghostcam-enable-gps.sh"
    - cp files/gpsd.conf "$1/etc/default/gpsd"

    # ALSA config for INMP441 I2S mic (image-specific hardware).
    - cp files/asound.conf "$1/etc/asound.conf"

    # First-boot bootstrap: unblock rfkill (BT adapter is soft-blocked
    # by default on PiOS-style images, which prevents the camera daemon
    # from advertising its onboarding GATT service) and optionally apply
    # /boot/firmware/wifi.conf for lab/diagnostic use when cellular
    # isn't available. The .deb postinst can't unblock rfkill because
    # postinst runs in a chroot during image build with no kernel state.
    - cp files/ghostcam-firstboot.sh "$1/usr/local/bin/ghostcam-firstboot"
    - chmod 755 "$1/usr/local/bin/ghostcam-firstboot"
    - cp files/ghostcam-firstboot.service "$1/etc/systemd/system/"

    # Late-boot diagnostic snapshot. Dumps NM/BT/camera state to
    # /boot/firmware/diag.log 90s after multi-user.target so the SD card
    # can be pulled and read on any OS for post-mortem when SSH isn't
    # reachable. Cheap (runs once) and harmless to leave enabled.
    - cp files/ghostcam-diag.sh "$1/usr/local/bin/ghostcam-diag"
    - chmod 755 "$1/usr/local/bin/ghostcam-diag"
    - cp files/ghostcam-diag.service "$1/etc/systemd/system/"

    # USB composite gadget for local-first onboarding (#144). Brings up a
    # driver-free ECM+RNDIS+mass-storage+ACM gadget and pins usb0 to
    # 10.55.0.1 so a plugged-in laptop/phone lands on the camera's local
    # provisioning page (served by the daemon's ScanLocalHTTP, #141) with
    # no server in the loop. See pi/GADGET-SPIKE.md for the #139 findings
    # + the per-host-OS validation checklist.
    - cp files/ghostcam-usb-gadget.sh "$1/usr/local/bin/ghostcam-usb-gadget"
    - chmod 755 "$1/usr/local/bin/ghostcam-usb-gadget"
    - cp files/ghostcam-usb-gadget.service "$1/etc/systemd/system/"
    - cp files/ghostcam-usb-dhcp.service "$1/etc/systemd/system/"
    - cp files/ghostcam-usb-dnsmasq.conf "$1/etc/ghostcam/usb-dnsmasq.conf"
    - mkdir -p "$1/usr/local/share/ghostcam/usb-msd"
    - cp files/usb-msd/SETUP.HTM "$1/usr/local/share/ghostcam/usb-msd/SETUP.HTM"
    # Load dwc2 early so a UDC exists for the gadget.
    - cp files/ghostcam-usb-modules.conf "$1/etc/modules-load.d/ghostcam-usb.conf"
    # Keep NetworkManager off usb0 (the gadget owns its addressing).
    - mkdir -p "$1/etc/NetworkManager/conf.d"
    - cp files/ghostcam-usb0-unmanaged.conf "$1/etc/NetworkManager/conf.d/"
    # Mask the distro dnsmasq.service — we run a dedicated instance bound
    # to usb0 (ghostcam-usb-dhcp.service) and don't want the default one
    # binding all interfaces. Symlink-to-/dev/null is the chroot-safe mask.
    - ln -sf /dev/null "$1/etc/systemd/system/dnsmasq.service"

    # NetworkManager + udev for SIM7600 cellular modem.
    - cp files/no-connectivity-check.conf "$1/etc/NetworkManager/conf.d/"
    - mkdir -p "$1/etc/NetworkManager/dispatcher.d"
    - cp files/99-keep-cellular-route "$1/etc/NetworkManager/dispatcher.d/"
    - chmod 755 "$1/etc/NetworkManager/dispatcher.d/99-keep-cellular-route"
    - cp files/99-sim7600.rules "$1/etc/udev/rules.d/"

    # Append camera/audio/GPIO settings to config.txt
    - |-
      printf '%s\n' \
        'camera_auto_detect=1' \
        'dtparam=i2s=on' \
        'dtparam=i2c_arm=on' \
        'dtoverlay=googlevoicehat-soundcard' \
        'enable_uart=1' \
        'gpu_mem=128' \
        'dtoverlay=dwc2,dr_mode=peripheral' \
        >> "$1/boot/firmware/config.txt"

    # Enable image-only services (ghostcam-camera is already enabled
    # by the .deb's postinst). bluetooth.service is enabled by the
    # bluez postinst but bookworm-minbase's policy-rc.d may suppress
    # it during chroot install — enable explicitly to be safe.
    - $BDEBSTRAP_HOOKS/enable-units "$1" ghostcam-gps
    - $BDEBSTRAP_HOOKS/enable-units "$1" gpsd
    - $BDEBSTRAP_HOOKS/enable-units "$1" ghostcam-firstboot
    - $BDEBSTRAP_HOOKS/enable-units "$1" ghostcam-diag
    - $BDEBSTRAP_HOOKS/enable-units "$1" ghostcam-usb-gadget
    - $BDEBSTRAP_HOOKS/enable-units "$1" ghostcam-usb-dhcp
    - $BDEBSTRAP_HOOKS/enable-units "$1" bluetooth
    # sshd is installed (via X-Env-Layer-Requires above) but *not* enabled
    # by default — production cameras don't need remote shell and we don't
    # want a network-reachable login on every shipped device. To turn it
    # on, drop an empty `/boot/firmware/ssh` touchfile (PiOS convention)
    # and/or an `authorized_keys` file onto the boot partition before
    # first boot. ghostcam-firstboot.sh consumes both. `scripts/pi
    # flash-dev` automates this for dev images.
