# Dedicated dnsmasq instance for the USB gadget link (#144). Standalone,
# bound only to usb0 so it never touches NetworkManager's interfaces or
# any system dnsmasq. Hands the plugged-in host exactly one address and
# points it back at the camera as gateway + DNS, so ghostcam.local (#142)
# and http://10.55.0.1 resolve over the wire with no internet.
interface=usb0
bind-interfaces
except-interface=lo
# Single-host point-to-point link: lease just 10.55.0.2.
dhcp-range=10.55.0.2,10.55.0.2,255.255.255.0,10m
dhcp-option=3,10.55.0.1   # gateway = the camera
dhcp-option=6,10.55.0.1   # DNS = the camera (for captive-portal-style resolve)
# Resolve everything to the camera so any hostname the host tries lands
# on the provisioning page (mirrors the SoftAP captive-portal behaviour).
address=/#/10.55.0.1
no-resolv
no-hosts
