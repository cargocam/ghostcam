# gpsd configuration for SIM7600G-H modem GPS
# GPS NMEA output appears on /dev/ttyUSB1 after ModemManager enables it.
#
# DEVICES is a best-effort seed only. On a cold boot gpsd starts before
# the SIM7600 finishes USB enumeration, can't open /dev/ttyUSB1 yet, and
# — with USBAUTO="false" — never retries, so it ends up with no device
# and cgps stays NA. The reliable attach happens in
# ghostcam-enable-gps.sh (`gpsdctl add /dev/ttyUSB1`), which runs
# After=ModemManager once the port actually exists. USBAUTO stays
# "false" deliberately: auto-add would also try to bind the modem's
# other ttyUSB ports (diag/AT), which aren't GPS.
START_DAEMON="true"
GPSD_OPTIONS="-n"
DEVICES="/dev/ttyUSB1"
USBAUTO="false"
GPSD_SOCKET="/var/run/gpsd.sock"
