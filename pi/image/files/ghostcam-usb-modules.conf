# Load dwc2 (the Zero 2 W USB OTG controller in peripheral mode) early so
# a UDC exists for the composite gadget. libcomposite is modprobe'd by
# ghostcam-usb-gadget.sh at bring-up. Paired with `dtoverlay=dwc2` appended
# to config.txt by the image layer.
#
# Platform seam (#138): on a CM4/CM5 move, revisit both the overlay and
# whether dwc2 is still the right module (GHOSTCAM_UDC overrides the name).
dwc2
