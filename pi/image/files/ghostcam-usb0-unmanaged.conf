# Keep NetworkManager's hands off the gadget interface — ghostcam-usb-gadget
# owns usb0's addressing (static 10.55.0.1) and a dedicated dnsmasq serves
# DHCP on it. Without this, NM would try to auto-manage usb0 and fight the
# gadget bring-up. Mirrors the SIM7600 cellular conf.d pattern in this dir.
[keyfile]
unmanaged-devices=interface-name:usb0
