name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Detect which paths changed to skip unnecessary work
  changes:
    runs-on: ubuntu-latest
    outputs:
      camera: ${{ steps.filter.outputs.camera }}
      server: ${{ steps.filter.outputs.server }}
      ui: ${{ steps.filter.outputs.ui }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            camera:
              - 'camera/**'
              - 'api/**'
              - 'cmd/ghostcam-camera/**'
              - 'go.mod'
              - 'go.sum'
            server:
              - 'server/**'
              - 'api/**'
              - 'cmd/ghostcam-server/**'
              - 'go.mod'
              - 'go.sum'
            ui:
              - 'ui/**'

  go:
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go vet ./...
      - run: go build ./cmd/ghostcam-server
      - name: Build camera binary
        if: needs.changes.outputs.camera == 'true'
        run: go build ./cmd/ghostcam-camera
      - run: go test ./...

  ui:
    needs: changes
    if: needs.changes.outputs.ui == 'true' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: cd ui && bun install --frozen-lockfile
      - run: cd ui && bun run check
      - run: cd ui && bun run test
      - run: cd ui && bun run build

  docker:
    needs: [go, ui, changes]
    if: always() && needs.go.result == 'success' && (needs.ui.result == 'success' || needs.ui.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build server image
        run: |
          docker buildx build --target server -t ghostcam-server \
            --cache-from type=gha,scope=server \
            --cache-to type=gha,mode=max,scope=server \
            --load .
      - name: Build camera image
        if: needs.changes.outputs.camera == 'true'
        run: |
          docker buildx build --target camera -t ghostcam-camera \
            --cache-from type=gha,scope=camera \
            --cache-to type=gha,mode=max,scope=camera \
            --load .

  deploy:
    needs: [go, ui, docker]
    if: always() && github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.go.result == 'success' && (needs.ui.result == 'success' || needs.ui.result == 'skipped') && needs.docker.result == 'success'
    runs-on: ubuntu-latest
    concurrency: deploy-production
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  # Publish camera firmware to Tigris when camera code changes on main.
  # Cameras check GET /api/v1/firmware/latest on startup and auto-update.
  publish-firmware:
    needs: [go, changes]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.changes.outputs.camera == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build camera binary (aarch64)
        run: CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -o ghostcam-camera-aarch64 ./cmd/ghostcam-camera
      - name: Determine version
        id: version
        run: echo "version=$(git describe --tags --always)" >> "$GITHUB_OUTPUT"
      - name: Upload firmware to server
        env:
          GHOSTCAM_PUBLIC_URL: ${{ secrets.GHOSTCAM_PUBLIC_URL }}
          ADMIN_TOKEN: ${{ secrets.ADMIN_API_TOKEN }}
        run: |
          if [ -n "$GHOSTCAM_PUBLIC_URL" ] && [ -n "$ADMIN_TOKEN" ]; then
            curl -f -X POST "$GHOSTCAM_PUBLIC_URL/api/v1/admin/firmware" \
              -H "Authorization: Bearer $ADMIN_TOKEN" \
              -F "version=${{ steps.version.outputs.version }}" \
              -F "binary=@ghostcam-camera-aarch64"
            echo "Firmware ${{ steps.version.outputs.version }} published"
          else
            echo "Skipping firmware publish (GHOSTCAM_PUBLIC_URL or ADMIN_API_TOKEN not set)"
          fi
