name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get install -y libasound2-dev libopus-dev
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test --all
      - name: Dependency audit
        run: |
          curl -sL https://github.com/rustsec/rustsec/releases/latest/download/cargo-audit-x86_64-unknown-linux-musl.tgz \
            | tar xzf - -C /usr/local/bin --strip-components=1
          # Ignore unfixable transitive deps:
          # RUSTSEC-2023-0071: rsa timing (sqlx-mysql, no fix available, we use PostgreSQL)
          # RUSTSEC-2025-0057: fxhash unmaintained (str0m -> sctp-proto)
          cargo audit \
            --ignore RUSTSEC-2023-0071 \
            --ignore RUSTSEC-2025-0057

  ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: cd ui && bun install --frozen-lockfile
      - run: cd ui && bun run check
      - run: cd ui && bun run build

  docker:
    needs: [rust, ui]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build server and camera images in parallel
        run: |
          docker buildx build --target server -t ghostcam-server --cache-from type=gha --cache-to type=gha,mode=max --load . &
          docker buildx build --target camera -t ghostcam-camera --cache-from type=gha --cache-to type=gha,mode=max --load . &
          wait
