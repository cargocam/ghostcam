name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Detect which paths changed to skip unnecessary work
  changes:
    runs-on: ubuntu-latest
    outputs:
      camera: ${{ steps.filter.outputs.camera }}
      server: ${{ steps.filter.outputs.server }}
      ui: ${{ steps.filter.outputs.ui }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            camera:
              - 'camera/**'
              - 'common/**'
              - 'go.mod'
              - 'go.sum'
            server:
              - 'server/**'
              - 'common/**'
              - 'go.mod'
              - 'go.sum'
            ui:
              - 'ui/**'

  go:
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go vet ./...
      - run: go build ./server
      - name: Build camera binary
        if: needs.changes.outputs.camera == 'true'
        run: go build ./camera
      - run: go test ./...
      # Hard-fail drift check: regenerate TypeScript types from the Go
      # source of truth (common/ + server/apitypes/) and fail if the
      # checked-in ui/src/lib/api-types/ files no longer match. Run
      # `make generate-types` locally and commit the diff to fix.
      - name: Check api-types are in sync with Go source
        run: make check-types

  ui:
    needs: changes
    if: needs.changes.outputs.ui == 'true' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: cd ui && bun install --frozen-lockfile
      - run: cd ui && bun run check
      - run: cd ui && bun run test
      - run: cd ui && bun run build

  docker:
    needs: [go, ui, changes]
    if: always() && needs.go.result == 'success' && (needs.ui.result == 'success' || needs.ui.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build server image
        run: |
          docker buildx build --target server -t ghostcam-server \
            --cache-from type=gha,scope=server \
            --cache-to type=gha,mode=max,scope=server \
            --load .
      - name: Build camera image
        if: needs.changes.outputs.camera == 'true'
        run: |
          docker buildx build --target camera -t ghostcam-camera \
            --cache-from type=gha,scope=camera \
            --cache-to type=gha,mode=max,scope=camera \
            --load .

  deploy:
    needs: [go, ui, docker]
    if: always() && github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.go.result == 'success' && (needs.ui.result == 'success' || needs.ui.result == 'skipped') && needs.docker.result == 'success'
    runs-on: ubuntu-latest
    concurrency: deploy-production
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  # Auto-tag a release when camera/api code changes on main.
  # This triggers the release.yml workflow which builds binaries,
  # .deb, Docker images, Pi images, and creates a GitHub Release.
  release-tag:
    needs: [go, changes]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.changes.outputs.camera == 'true' && needs.go.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Determine next version
        id: version
        run: |
          # Get the latest v* tag, default to v0.0.0 if none exist
          LATEST=$(git tag -l 'v*' --sort=-v:refname | head -1)
          if [ -z "$LATEST" ]; then
            NEXT="v0.1.0"
          else
            # Bump patch version: v0.1.2 -> v0.1.3
            IFS='.' read -r MAJOR MINOR PATCH <<< "${LATEST#v}"
            PATCH=$((PATCH + 1))
            NEXT="v${MAJOR}.${MINOR}.${PATCH}"
          fi
          echo "tag=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Next release: $NEXT (previous: ${LATEST:-none})"
      - name: Create and push tag
        run: |
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}
