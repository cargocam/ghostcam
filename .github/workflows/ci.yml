name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# All jobs target the self-hosted runner. If it's offline, jobs queue
# until it comes back (30-min timeout per job).
jobs:
  go:
    runs-on: self-hosted
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go vet ./...
      - run: go build -o /tmp/ghostcam-server ./server
      - run: go test ./...
      - name: Check generated types are in sync with Go source
        run: |
          go generate ./...
          git add --intent-to-add ui/src/lib/api-types/ camera/ghostcam/wire/ 2>/dev/null || true
          git diff --exit-code -- ui/src/lib/api-types/ camera/ghostcam/wire/ \
            || (echo "Generated wire types are stale. Run 'go generate ./...' and commit." && exit 1)

  python:
    runs-on: self-hosted
    timeout-minutes: 30
    defaults:
      run:
        working-directory: camera
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      # Lockfile-driven — uv.lock pins every transitive dep so a
      # remote-resolution change can't drift the daemon between
      # commits. Bumping a dep is `uv lock --upgrade-package <name>`
      # and a follow-up commit.
      - run: uv sync --frozen --extra dev --extra real
      - run: uv run ruff check .
      - run: uv run mypy ghostcam
      - run: uv run pytest -q
      - run: uv build --wheel

  ui:
    runs-on: self-hosted
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: cd ui && bun install --frozen-lockfile
      - run: cd ui && bun run check
      - run: cd ui && bun run test
      - run: cd ui && bun run build

  infra:
    needs: [go, ui]
    runs-on: self-hosted
    timeout-minutes: 30
    concurrency: infra-production
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for infra changes
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE=${{ github.event.pull_request.base.sha }}
          else
            BASE=${{ github.event.before }}
          fi
          git diff --name-only "$BASE" HEAD | grep -q '^infra/' && echo "infra=true" >> "$GITHUB_OUTPUT" || echo "infra=false" >> "$GITHUB_OUTPUT"
      - uses: actions/setup-go@v5
        if: steps.changed.outputs.infra == 'true'
        with:
          go-version-file: infra/go.mod
      - uses: superfly/flyctl-actions/setup-flyctl@master
        if: steps.changed.outputs.infra == 'true'
      - uses: pulumi/actions@v5
        if: steps.changed.outputs.infra == 'true'
        with:
          command: ${{ github.event_name == 'push' && 'up' || 'preview' }}
          stack-name: prod
          work-dir: infra
          comment-on-pr: true
          expect-no-changes: false
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}


