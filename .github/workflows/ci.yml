name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go vet ./...
      - run: go build ./cmd/ghostcam-server
      - run: go build ./cmd/ghostcam-camera
      - run: go test ./...

  ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: cd ui && bun install --frozen-lockfile
      - run: cd ui && bun run check
      - run: cd ui && bun run build

  docker:
    needs: [go, ui]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build server and camera images
        run: |
          docker buildx build --target server -t ghostcam-server \
            --cache-from type=gha,scope=server \
            --cache-to type=gha,mode=max,scope=server \
            --load . &
          PID1=$!
          docker buildx build --target camera -t ghostcam-camera \
            --cache-from type=gha,scope=camera \
            --cache-to type=gha,mode=max,scope=camera \
            --load . &
          PID2=$!
          wait $PID1; STATUS1=$?
          wait $PID2; STATUS2=$?
          [ $STATUS1 -eq 0 ] && [ $STATUS2 -eq 0 ]
