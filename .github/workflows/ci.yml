name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # `go` and `ui` both run in <1 min and always need to pass before we
  # merge code, so there's nothing to gain from path-filtering them.
  # Docs-only pushes pay a small cost; code pushes pay nothing.
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go vet ./...
      # `go build ./server` / `./camera` need explicit -o because the
      # output name defaults to the last path component, which is also
      # the directory name (ambiguity: file vs directory). Dockerfile
      # already does the same. Write to /tmp so the workspace stays clean.
      - run: go build -o /tmp/ghostcam-server ./server
      - run: go build -o /tmp/ghostcam-camera ./camera
      - run: go test ./...
      # Hard-fail drift check: regenerate TypeScript types from the Go
      # source of truth (common/ + server/apitypes/) and fail if the
      # checked-in ui/src/lib/api-types/ files no longer match. Run
      # `go generate ./...` locally and commit the diff to fix.
      - name: Check api-types are in sync with Go source
        run: |
          go generate ./...
          git add --intent-to-add ui/src/lib/api-types/ 2>/dev/null || true
          git diff --exit-code -- ui/src/lib/api-types/ \
            || (echo "ui/src/lib/api-types/ is stale. Run 'go generate ./...' and commit." && exit 1)

  ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: cd ui && bun install --frozen-lockfile
      - run: cd ui && bun run check
      - run: cd ui && bun run test
      - run: cd ui && bun run build

  # Docker builds are the only job slow enough to justify path-gating
  # (~2 min). Scoped inline with paths-filter so a single-job failure
  # doesn't block us (as a cross-job `changes` dep did previously).
  docker:
    needs: [go, ui]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'camera/**'
              - 'server/**'
              - 'common/**'
              - 'ui/**'
              - 'go.mod'
              - 'go.sum'
              - 'Dockerfile'
              - 'docker-compose.yml'
            camera:
              - 'camera/**'
              - 'common/**'
              - 'go.mod'
              - 'go.sum'
      - uses: docker/setup-buildx-action@v3
        if: steps.filter.outputs.code == 'true'
      - name: Build server image
        if: steps.filter.outputs.code == 'true'
        run: |
          docker buildx build --target server -t ghostcam-server \
            --cache-from type=gha,scope=server \
            --cache-to type=gha,mode=max,scope=server \
            --load .
      - name: Build camera image
        if: steps.filter.outputs.camera == 'true'
        run: |
          docker buildx build --target camera -t ghostcam-camera \
            --cache-from type=gha,scope=camera \
            --cache-to type=gha,mode=max,scope=camera \
            --load .

  deploy:
    needs: [go, ui, docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    concurrency: deploy-production
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  # Auto-tag a release when camera/api code changes on main.
  # This triggers the release.yml workflow which builds binaries,
  # .deb, Docker images, Pi images, and creates a GitHub Release.
  release-tag:
    needs: [go]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use a PAT so the tag push triggers the release workflow.
          # GITHUB_TOKEN deliberately doesn't trigger downstream workflows
          # to prevent recursive loops.
          token: ${{ secrets.RELEASE_TOKEN }}
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            camera:
              - 'camera/**'
              - 'common/**'
              - 'go.mod'
              - 'go.sum'
      - name: Determine next version
        if: steps.filter.outputs.camera == 'true'
        id: version
        run: |
          # Get the latest v* tag, default to v0.0.0 if none exist
          LATEST=$(git tag -l 'v*' --sort=-v:refname | head -1)
          if [ -z "$LATEST" ]; then
            NEXT="v0.1.0"
          else
            # Bump patch version: v0.1.2 -> v0.1.3
            IFS='.' read -r MAJOR MINOR PATCH <<< "${LATEST#v}"
            PATCH=$((PATCH + 1))
            NEXT="v${MAJOR}.${MINOR}.${PATCH}"
          fi
          echo "tag=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Next release: $NEXT (previous: ${LATEST:-none})"
      - name: Create and push tag
        if: steps.filter.outputs.camera == 'true'
        run: |
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}
