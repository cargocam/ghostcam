name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust (fmt, clippy, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libopus-dev pkg-config

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Generate test data
        run: |
          mkdir -p test-data
          ffmpeg -f lavfi -i testsrc2=duration=1:size=320x240:rate=30 \
            -c:v libx264 -profile:v baseline -x264-params keyint=30:min-keyint=30 \
            -f h264 test-data/test.h264

      - name: Test
        run: cargo test --all

  ui:
    name: Viewer (check, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run check

      - name: Build
        run: bun run build

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [rust, ui]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build bridge image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: bridge
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build agent image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: agent
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
