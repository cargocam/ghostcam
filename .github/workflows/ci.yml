name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# All jobs target the self-hosted runner. If it's offline, jobs queue
# until it comes back (30-min timeout per job).
jobs:
  go:
    runs-on: self-hosted
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go vet ./...
      - run: go build -o /tmp/ghostcam-server ./server
      - run: go build -o /tmp/ghostcam-camera ./camera
      - run: go test ./...
      - name: Check api-types are in sync with Go source
        run: |
          go generate ./...
          git add --intent-to-add ui/src/lib/api-types/ 2>/dev/null || true
          git diff --exit-code -- ui/src/lib/api-types/ \
            || (echo "ui/src/lib/api-types/ is stale. Run 'go generate ./...' and commit." && exit 1)

  ui:
    runs-on: self-hosted
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: cd ui && bun install --frozen-lockfile
      - run: cd ui && bun run check
      - run: cd ui && bun run test
      - run: cd ui && bun run build

  deploy:
    needs: [go, ui]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: self-hosted
    timeout-minutes: 30
    concurrency: deploy-production
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

