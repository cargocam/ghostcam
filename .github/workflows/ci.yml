name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# All jobs target the self-hosted runner. If it's offline, jobs queue
# for up to 10 minutes then GitHub cancels them — push again when the
# runner is back, or temporarily change runs-on to ubuntu-latest.
jobs:
  go:
    runs-on: self-hosted
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go vet ./...
      - run: go build -o /tmp/ghostcam-server ./server
      - run: go build -o /tmp/ghostcam-camera ./camera
      - run: go test ./...
      - name: Check api-types are in sync with Go source
        run: |
          go generate ./...
          git add --intent-to-add ui/src/lib/api-types/ 2>/dev/null || true
          git diff --exit-code -- ui/src/lib/api-types/ \
            || (echo "ui/src/lib/api-types/ is stale. Run 'go generate ./...' and commit." && exit 1)

  ui:
    runs-on: self-hosted
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: cd ui && bun install --frozen-lockfile
      - run: cd ui && bun run check
      - run: cd ui && bun run test
      - run: cd ui && bun run build

  docker:
    needs: [go, ui]
    runs-on: self-hosted
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'camera/**'
              - 'server/**'
              - 'common/**'
              - 'ui/**'
              - 'go.mod'
              - 'go.sum'
              - 'Dockerfile'
              - 'docker-compose.yml'
            camera:
              - 'camera/**'
              - 'common/**'
              - 'go.mod'
              - 'go.sum'
      - uses: docker/setup-buildx-action@v3
        if: steps.filter.outputs.code == 'true'
      - name: Build server image
        if: steps.filter.outputs.code == 'true'
        run: |
          docker buildx build --target server -t ghostcam-server \
            --cache-from type=gha,scope=server \
            --cache-to type=gha,mode=max,scope=server \
            --load .
      - name: Build camera image
        if: steps.filter.outputs.camera == 'true'
        run: |
          docker buildx build --target camera -t ghostcam-camera \
            --cache-from type=gha,scope=camera \
            --cache-to type=gha,mode=max,scope=camera \
            --load .

  deploy:
    needs: [go, ui, docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: self-hosted
    timeout-minutes: 30
    concurrency: deploy-production
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  release-tag:
    needs: [go]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: self-hosted
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            camera:
              - 'camera/**'
              - 'common/**'
              - 'go.mod'
              - 'go.sum'
      - name: Determine next version
        if: steps.filter.outputs.camera == 'true'
        id: version
        run: |
          LATEST=$(git tag -l 'v*' --sort=-v:refname | head -1)
          if [ -z "$LATEST" ]; then
            NEXT="v0.1.0"
          else
            IFS='.' read -r MAJOR MINOR PATCH <<< "${LATEST#v}"
            PATCH=$((PATCH + 1))
            NEXT="v${MAJOR}.${MINOR}.${PATCH}"
          fi
          echo "tag=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Next release: $NEXT (previous: ${LATEST:-none})"
      - name: Create and push tag
        if: steps.filter.outputs.camera == 'true'
        run: |
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}
