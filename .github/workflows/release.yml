name: Release
on:
  push:
    branches: [main]

permissions:
  contents: write

# Rolling pre-release. Builds the Python camera wheel + a Debian
# package wrapping it, attaches both to the v0.1.0-alpha release.
# Pi cameras with auto-update enabled pull this on their next
# /api/v1/firmware/latest check.
jobs:
  release:
    runs-on: self-hosted
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      # Pure-Python wheel — no cross-compilation needed. We build the
      # wheel and the .deb (which wraps a Pi-side venv install of that
      # wheel) so cameras with auto-update can apt-install the .deb on
      # firmware check.
      #
      # `uv build` has its own wheel builder so we don't need the
      # standalone `build` package — keeps the dev-extras lean.
      - name: Build wheel
        working-directory: camera
        run: uv build --wheel --out-dir ../dist

      - name: Package .deb (wraps wheel install into /opt/ghostcam venv)
        run: |
          set -euo pipefail
          WHEEL="$(ls dist/ghostcam-*.whl | head -1)"
          PKG_DIR="ghostcam-camera_0.1.0-alpha_all"
          mkdir -p "$PKG_DIR/DEBIAN" "$PKG_DIR/opt/ghostcam-camera"
          cp "$WHEEL" "$PKG_DIR/opt/ghostcam-camera/"

          # postinst: install the wheel into /opt/ghostcam (venv) and
          # symlink the entrypoint at /usr/local/bin/ghostcam-camera.
          # systemd unit expects that path. Mirrors what scripts/pi.sh
          # deploy does for dev installs.
          cat > "$PKG_DIR/DEBIAN/postinst" << 'PEOF'
          #!/bin/sh
          set -e
          if [ ! -x /opt/ghostcam/bin/python3 ]; then
              python3 -m venv /opt/ghostcam
          fi
          WHEEL="$(ls /opt/ghostcam-camera/ghostcam-*.whl | head -1)"
          /opt/ghostcam/bin/pip install --quiet --upgrade --force-reinstall "$WHEEL[real]"
          ln -sf /opt/ghostcam/bin/ghostcam-camera /usr/local/bin/ghostcam-camera
          exit 0
          PEOF
          chmod 755 "$PKG_DIR/DEBIAN/postinst"

          cat > "$PKG_DIR/DEBIAN/control" << EOF
          Package: ghostcam-camera
          Version: 0.1.0~alpha
          Architecture: all
          Maintainer: Ghostcam <noreply@ghostcam.dev>
          Depends: ffmpeg, ca-certificates, python3, python3-venv, libzbar0
          Description: Ghostcam camera agent (Python)
           Captures video via rpicam-vid + ffmpeg and uploads
           HLS segments to S3 via presigned URLs.
          EOF
          sed -i 's/^          //' "$PKG_DIR/DEBIAN/control"
          dpkg-deb --build "$PKG_DIR"

      - name: Generate checksums
        run: sha256sum dist/ghostcam-*.whl ghostcam-camera_*.deb > checksums.txt

      - name: Install gh CLI
        run: |
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          sudo apt-get update -qq && sudo apt-get install -y -qq gh

      - name: Upsert release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete v0.1.0-alpha --yes 2>/dev/null || true
          git tag -f v0.1.0-alpha
          git push origin v0.1.0-alpha --force
          gh release create v0.1.0-alpha \
            dist/ghostcam-*.whl \
            ghostcam-camera_*.deb \
            checksums.txt \
            --prerelease \
            --title "v0.1.0-alpha (latest main)" \
            --notes "Rolling pre-release built from main at $(git rev-parse --short HEAD). Updated on every push."
