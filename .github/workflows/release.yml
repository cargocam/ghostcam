name: Release
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-camera:
    runs-on: self-hosted
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: arm64
            name: ghostcam-camera-aarch64
          - goos: linux
            goarch: amd64
            name: ghostcam-camera-x86_64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build camera binary
        run: |
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -ldflags "-X main.Version=${{ github.ref_name }}" \
            -o ${{ matrix.name }} ./camera
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  build-camera-deb:
    needs: build-camera
    runs-on: self-hosted
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: ghostcam-camera-aarch64
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Package as .deb
        run: |
          PKG_DIR="ghostcam-camera_${{ steps.version.outputs.version }}_arm64"
          mkdir -p "$PKG_DIR/DEBIAN"
          mkdir -p "$PKG_DIR/usr/local/bin"
          cp ghostcam-camera-aarch64 "$PKG_DIR/usr/local/bin/ghostcam-camera"
          chmod +x "$PKG_DIR/usr/local/bin/ghostcam-camera"
          cat > "$PKG_DIR/DEBIAN/control" << EOF
          Package: ghostcam-camera
          Version: ${{ steps.version.outputs.version }}
          Architecture: arm64
          Maintainer: Ghostcam <noreply@ghostcam.dev>
          Depends: ffmpeg, ca-certificates
          Description: Ghostcam camera agent
           Captures video via rpicam-vid + ffmpeg and uploads
           HLS segments to S3 via presigned URLs.
          EOF
          sed -i 's/^          //' "$PKG_DIR/DEBIAN/control"
          dpkg-deb --build "$PKG_DIR"
      - uses: actions/upload-artifact@v4
        with:
          name: ghostcam-camera-deb
          path: ghostcam-camera_*.deb

  release:
    needs: [build-camera, build-camera-deb]
    runs-on: self-hosted
    timeout-minutes: 30
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Generate checksums
        run: sha256sum ghostcam-camera* > checksums.txt
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            ghostcam-camera-aarch64
            ghostcam-camera-x86_64
            ghostcam-camera_*.deb
            checksums.txt
          generate_release_notes: true
