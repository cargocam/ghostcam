name: Release
on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/ghostcam

jobs:
  build-camera:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: aarch64-unknown-linux-gnu
            name: ghostcam-camera-aarch64
            cross: true
          - target: x86_64-unknown-linux-gnu
            name: ghostcam-camera-x86_64
            cross: false
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install native deps (x86_64)
        if: ${{ !matrix.cross }}
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libopus-dev pkg-config
      - name: Install cross-compilation deps (aarch64)
        if: ${{ matrix.cross }}
        run: |
          sudo dpkg --add-architecture arm64
          # Add arm64 sources without touching existing list files
          echo "deb [arch=arm64] http://ports.ubuntu.com/ $(lsb_release -cs) main restricted universe" | sudo tee /etc/apt/sources.list.d/arm64-ports.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ $(lsb_release -cs)-updates main restricted universe" | sudo tee -a /etc/apt/sources.list.d/arm64-ports.list
          sudo apt-get update || true
          sudo apt-get install -y gcc-aarch64-linux-gnu pkg-config
          sudo apt-get install -y libasound2-dev:arm64 libopus-dev:arm64
      - name: Configure cross-compilation environment
        if: ${{ matrix.cross }}
        run: |
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_SYSROOT_DIR=/usr/aarch64-linux-gnu" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig" >> "$GITHUB_ENV"
      - name: Build camera binary
        run: cargo build --release --target ${{ matrix.target }} -p camera
      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/camera ${{ matrix.name }}
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  build-camera-deb:
    needs: build-camera
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download aarch64 binary
        uses: actions/download-artifact@v4
        with:
          name: ghostcam-camera-aarch64
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Package as .deb
        run: |
          PKG_DIR="ghostcam-camera_${{ steps.version.outputs.version }}_arm64"
          mkdir -p "$PKG_DIR/DEBIAN"
          mkdir -p "$PKG_DIR/usr/local/bin"
          cp ghostcam-camera-aarch64 "$PKG_DIR/usr/local/bin/ghostcam-camera"
          chmod +x "$PKG_DIR/usr/local/bin/ghostcam-camera"
          cat > "$PKG_DIR/DEBIAN/control" << 'EOF'
          Package: ghostcam-camera
          Version: ${{ steps.version.outputs.version }}
          Architecture: arm64
          Maintainer: Ghostcam <noreply@ghostcam.dev>
          Depends: libasound2, libopus0, ca-certificates
          Description: Ghostcam camera agent
           Streams H.264 video and Opus audio from Raspberry Pi cameras
           to the Ghostcam server over QUIC/mTLS.
          EOF
          sed -i 's/^          //' "$PKG_DIR/DEBIAN/control"
          dpkg-deb --build "$PKG_DIR"
      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: ghostcam-camera-deb
          path: ghostcam-camera_*.deb

  build-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push server
        uses: docker/build-push-action@v5
        with:
          push: true
          target: server
          tags: ${{ env.IMAGE_PREFIX }}-server:${{ github.ref_name }},${{ env.IMAGE_PREFIX }}-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-pi-image:
    needs: build-camera-deb
    runs-on: ubuntu-latest
    strategy:
      matrix:
        device: [zero2w, pi4, pi5]
    steps:
      - uses: actions/checkout@v4
      - name: Install rpi-image-gen dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            binfmt-support qemu-user-static kpartx fdisk \
            dosfstools e2fsprogs debootstrap systemd-container xz-utils
      - name: Clone rpi-image-gen
        run: git clone --depth 1 https://github.com/raspberrypi/rpi-image-gen.git /tmp/rpi-image-gen
      - name: Download camera .deb
        uses: actions/download-artifact@v4
        with:
          name: ghostcam-camera-deb
          path: pi/image/pkgs
      - name: Build image for ${{ matrix.device }}
        run: |
          cd /tmp/rpi-image-gen
          cp -r "$GITHUB_WORKSPACE/pi/image/layer/ghostcam.yaml" layers/ghostcam.yaml
          cp -r "$GITHUB_WORKSPACE/pi/image/files" layers/ghostcam-files
          cp -r "$GITHUB_WORKSPACE/pi/image/pkgs" layers/ghostcam-pkgs
          sed -i 's|files/|layers/ghostcam-files/|g' layers/ghostcam.yaml
          sed -i 's|pkgs/|layers/ghostcam-pkgs/|g' layers/ghostcam.yaml
          sudo ./build.sh "$GITHUB_WORKSPACE/pi/image/config/ghostcam-${{ matrix.device }}.yaml"
      - name: Compress image
        run: |
          IMG=$(find /tmp/rpi-image-gen/output -name '*.img' | head -1)
          xz -9 -T0 "$IMG"
          cp "${IMG}.xz" "ghostcam-${{ matrix.device }}-${{ github.ref_name }}.img.xz"
      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: ghostcam-${{ matrix.device }}-image
          path: ghostcam-${{ matrix.device }}-*.img.xz

  release:
    needs: [build-camera, build-camera-deb, build-docker]
    # Pi image build is best-effort — don't block the release
    if: always() && needs.build-camera.result == 'success' && needs.build-camera-deb.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Generate checksums
        run: sha256sum ghostcam-camera-* ghostcam-*.img.xz > checksums.txt 2>/dev/null || sha256sum ghostcam-camera-* > checksums.txt
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ghostcam-camera-aarch64
            ghostcam-camera-x86_64
            ghostcam-camera_*.deb
            ghostcam-*.img.xz
            checksums.txt
          generate_release_notes: true
