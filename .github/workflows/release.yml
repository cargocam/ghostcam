name: Release
on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/ghostcam

jobs:
  build-camera:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: arm64
            name: ghostcam-camera-aarch64
          - goos: linux
            goarch: amd64
            name: ghostcam-camera-x86_64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build camera binary
        run: |
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -ldflags "-X main.Version=${{ github.ref_name }}" \
            -o ${{ matrix.name }} ./camera
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  build-camera-deb:
    needs: build-camera
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: ghostcam-camera-aarch64
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Package as .deb
        run: |
          PKG_DIR="ghostcam-camera_${{ steps.version.outputs.version }}_arm64"
          mkdir -p "$PKG_DIR/DEBIAN"
          mkdir -p "$PKG_DIR/usr/local/bin"
          cp ghostcam-camera-aarch64 "$PKG_DIR/usr/local/bin/ghostcam-camera"
          chmod +x "$PKG_DIR/usr/local/bin/ghostcam-camera"
          cat > "$PKG_DIR/DEBIAN/control" << EOF
          Package: ghostcam-camera
          Version: ${{ steps.version.outputs.version }}
          Architecture: arm64
          Maintainer: Ghostcam <noreply@ghostcam.dev>
          Depends: ffmpeg, ca-certificates
          Description: Ghostcam camera agent
           Captures video via rpicam-vid + ffmpeg and uploads
           HLS segments to S3 via presigned URLs.
          EOF
          sed -i 's/^          //' "$PKG_DIR/DEBIAN/control"
          dpkg-deb --build "$PKG_DIR"
      - uses: actions/upload-artifact@v4
        with:
          name: ghostcam-camera-deb
          path: ghostcam-camera_*.deb

  build-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push server
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          target: server
          tags: ${{ env.IMAGE_PREFIX }}-server:${{ github.ref_name }},${{ env.IMAGE_PREFIX }}-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-pi-image:
    needs: build-camera-deb
    runs-on: ubuntu-latest
    strategy:
      matrix:
        device: [zero2w, pi4, pi5]
    steps:
      - uses: actions/checkout@v4
      - name: Clone rpi-image-gen
        run: git clone --depth 1 https://github.com/raspberrypi/rpi-image-gen.git /tmp/rpi-image-gen
      - name: Install rpi-image-gen dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y binfmt-support qemu-user-static
          sudo /tmp/rpi-image-gen/install_deps.sh
      - uses: actions/download-artifact@v4
        with:
          name: ghostcam-camera-deb
          path: pi/image/pkgs
      - name: Set device-specific video profile
        run: |
          PROFILE="${{ matrix.device }}"
          [ "$PROFILE" = "zero2w" ] && PROFILE="zero2w"
          echo "GHOSTCAM_VIDEO_PROFILE=$PROFILE" >> pi/image/files/ghostcam.env
      - name: Build image for ${{ matrix.device }}
        run: |
          sudo /tmp/rpi-image-gen/rpi-image-gen build \
            -c "$GITHUB_WORKSPACE/pi/image/config/ghostcam-${{ matrix.device }}.yaml" \
            -S "$GITHUB_WORKSPACE/pi/image"
      - name: Compress image
        run: |
          IMG=$(sudo find work/ -name '*.img' | head -1)
          sudo xz -9 -T0 "$IMG"
          sudo cp "${IMG}.xz" "ghostcam-${{ matrix.device }}-${{ github.ref_name }}.img.xz"
      - uses: actions/upload-artifact@v4
        with:
          name: ghostcam-${{ matrix.device }}-image
          path: ghostcam-${{ matrix.device }}-*.img.xz

  release:
    needs: [build-camera, build-camera-deb, build-docker, build-pi-image]
    if: always() && needs.build-camera.result == 'success' && needs.build-camera-deb.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Generate checksums
        run: sha256sum ghostcam-camera* ghostcam-*.img.xz > checksums.txt 2>/dev/null || sha256sum ghostcam-camera* > checksums.txt
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            ghostcam-camera-aarch64
            ghostcam-camera-x86_64
            ghostcam-camera_*.deb
            ghostcam-*.img.xz
            checksums.txt
          generate_release_notes: true
