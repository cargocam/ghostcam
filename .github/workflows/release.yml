name: Release
on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: self-hosted
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build camera (aarch64)
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 \
            go build -ldflags "-X main.Version=v0.1.0-alpha" \
            -o ghostcam-camera-aarch64 ./camera

      - name: Build camera (x86_64)
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -ldflags "-X main.Version=v0.1.0-alpha" \
            -o ghostcam-camera-x86_64 ./camera

      - name: Package .deb
        run: |
          PKG_DIR="ghostcam-camera_0.1.0-alpha_arm64"
          mkdir -p "$PKG_DIR/DEBIAN" "$PKG_DIR/usr/local/bin"
          cp ghostcam-camera-aarch64 "$PKG_DIR/usr/local/bin/ghostcam-camera"
          chmod +x "$PKG_DIR/usr/local/bin/ghostcam-camera"
          cat > "$PKG_DIR/DEBIAN/control" << EOF
          Package: ghostcam-camera
          Version: 0.1.0~alpha
          Architecture: arm64
          Maintainer: Ghostcam <noreply@ghostcam.dev>
          Depends: ffmpeg, ca-certificates
          Description: Ghostcam camera agent
           Captures video via rpicam-vid + ffmpeg and uploads
           HLS segments to S3 via presigned URLs.
          EOF
          sed -i 's/^          //' "$PKG_DIR/DEBIAN/control"
          dpkg-deb --build "$PKG_DIR"

      - name: Generate checksums
        run: sha256sum ghostcam-camera-aarch64 ghostcam-camera-x86_64 ghostcam-camera_*.deb > checksums.txt

      - name: Install gh CLI
        run: |
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          sudo apt-get update -qq && sudo apt-get install -y -qq gh

      - name: Upsert release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete v0.1.0-alpha --yes 2>/dev/null || true
          git tag -f v0.1.0-alpha
          git push origin v0.1.0-alpha --force
          gh release create v0.1.0-alpha \
            ghostcam-camera-aarch64 \
            ghostcam-camera-x86_64 \
            ghostcam-camera_*.deb \
            checksums.txt \
            --prerelease \
            --title "v0.1.0-alpha (latest main)" \
            --notes "Rolling pre-release built from main at $(git rev-parse --short HEAD). Updated on every push."
