name: Release
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: self-hosted
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build camera (aarch64)
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 \
            go build -ldflags "-X main.Version=${{ github.ref_name }}" \
            -o ghostcam-camera-aarch64 ./camera

      - name: Build camera (x86_64)
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -ldflags "-X main.Version=${{ github.ref_name }}" \
            -o ghostcam-camera-x86_64 ./camera

      - name: Package .deb
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PKG_DIR="ghostcam-camera_${VERSION}_arm64"
          mkdir -p "$PKG_DIR/DEBIAN" "$PKG_DIR/usr/local/bin"
          cp ghostcam-camera-aarch64 "$PKG_DIR/usr/local/bin/ghostcam-camera"
          chmod +x "$PKG_DIR/usr/local/bin/ghostcam-camera"
          cat > "$PKG_DIR/DEBIAN/control" << EOF
          Package: ghostcam-camera
          Version: ${VERSION}
          Architecture: arm64
          Maintainer: Ghostcam <noreply@ghostcam.dev>
          Depends: ffmpeg, ca-certificates
          Description: Ghostcam camera agent
           Captures video via rpicam-vid + ffmpeg and uploads
           HLS segments to S3 via presigned URLs.
          EOF
          sed -i 's/^          //' "$PKG_DIR/DEBIAN/control"
          dpkg-deb --build "$PKG_DIR"

      - name: Generate checksums
        run: sha256sum ghostcam-camera-aarch64 ghostcam-camera-x86_64 ghostcam-camera_*.deb > checksums.txt

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            ghostcam-camera-aarch64 \
            ghostcam-camera-x86_64 \
            ghostcam-camera_*.deb \
            checksums.txt \
            --generate-notes
