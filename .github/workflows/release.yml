name: Release
on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/ghostcam

jobs:
  # Detect whether Pi image files changed to skip slow image builds
  # when only camera/server code changed.
  changes:
    runs-on: ubuntu-latest
    outputs:
      pi: ${{ steps.filter.outputs.pi }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - id: filter
        run: |
          # Compare against the previous commit on the tag
          if git diff --name-only HEAD~1 HEAD | grep -qE '^(pi/|Dockerfile|\.github/workflows/release\.yml)'; then
            echo "pi=true" >> "$GITHUB_OUTPUT"
          else
            echo "pi=false" >> "$GITHUB_OUTPUT"
          fi

  build-camera:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: arm64
            name: ghostcam-camera-aarch64
          - goos: linux
            goarch: amd64
            name: ghostcam-camera-x86_64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build camera binary
        run: |
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -ldflags "-X main.Version=${{ github.ref_name }}" \
            -o ${{ matrix.name }} ./camera
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  build-camera-deb:
    needs: build-camera
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: ghostcam-camera-aarch64
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Package as .deb
        run: |
          PKG_DIR="ghostcam-camera_${{ steps.version.outputs.version }}_arm64"
          mkdir -p "$PKG_DIR/DEBIAN"
          mkdir -p "$PKG_DIR/usr/local/bin"
          cp ghostcam-camera-aarch64 "$PKG_DIR/usr/local/bin/ghostcam-camera"
          chmod +x "$PKG_DIR/usr/local/bin/ghostcam-camera"
          cat > "$PKG_DIR/DEBIAN/control" << EOF
          Package: ghostcam-camera
          Version: ${{ steps.version.outputs.version }}
          Architecture: arm64
          Maintainer: Ghostcam <noreply@ghostcam.dev>
          Depends: ffmpeg, ca-certificates
          Description: Ghostcam camera agent
           Captures video via rpicam-vid + ffmpeg and uploads
           HLS segments to S3 via presigned URLs.
          EOF
          sed -i 's/^          //' "$PKG_DIR/DEBIAN/control"
          dpkg-deb --build "$PKG_DIR"
      - uses: actions/upload-artifact@v4
        with:
          name: ghostcam-camera-deb
          path: ghostcam-camera_*.deb

  build-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push server
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          target: server
          tags: ${{ env.IMAGE_PREFIX }}-server:${{ github.ref_name }},${{ env.IMAGE_PREFIX }}-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-pi-image:
    needs: [build-camera-deb, changes]
    if: needs.changes.outputs.pi == 'true'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository_owner }}/rpi-image-gen:latest
    strategy:
      matrix:
        device: [zero2w, pi4, pi5]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: ghostcam-camera-deb
          path: pi/image/pkgs
      - name: Set device-specific video profile
        run: |
          PROFILE="${{ matrix.device }}"
          echo "GHOSTCAM_VIDEO_PROFILE=$PROFILE" >> pi/image/files/ghostcam.env
      - name: Build image for ${{ matrix.device }}
        run: |
          /opt/rpi-image-gen/rpi-image-gen build \
            -c "$GITHUB_WORKSPACE/pi/image/config/ghostcam-${{ matrix.device }}.yaml" \
            -S "$GITHUB_WORKSPACE/pi/image"
      - name: Compress image
        run: |
          IMG=$(find work/ -name '*.img' | head -1)
          xz -3 -T0 "$IMG"
          cp "${IMG}.xz" "ghostcam-${{ matrix.device }}-${{ github.ref_name }}.img.xz"
      - uses: actions/upload-artifact@v4
        with:
          name: ghostcam-${{ matrix.device }}-image
          path: ghostcam-${{ matrix.device }}-*.img.xz

  # Publish the release as soon as camera binaries + .deb are ready.
  # Pi images are large and only needed for flashing new hardware,
  # so they're attached later by the attach-pi-images job.
  release:
    needs: [build-camera, build-camera-deb, build-docker]
    if: needs.build-camera.result == 'success' && needs.build-camera-deb.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Generate checksums
        run: sha256sum ghostcam-camera* > checksums.txt
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            ghostcam-camera-aarch64
            ghostcam-camera-x86_64
            ghostcam-camera_*.deb
            checksums.txt
          generate_release_notes: true

  # Attach Pi images to the release after they finish building.
  # Skipped entirely when pi/ files haven't changed.
  attach-pi-images:
    needs: [build-pi-image, release]
    if: always() && needs.release.result == 'success' && needs.build-pi-image.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: ghostcam-*-image
          merge-multiple: true
      - name: Attach Pi images to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for img in ghostcam-*.img.xz; do
            [ -f "$img" ] && gh release upload "${{ github.ref_name }}" "$img" --repo "${{ github.repository }}" --clobber
          done
          # Update checksums with Pi images included
          sha256sum ghostcam-*.img.xz >> checksums.txt 2>/dev/null || true
          gh release upload "${{ github.ref_name }}" checksums.txt --repo "${{ github.repository }}" --clobber
