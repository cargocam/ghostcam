name: Release
on:
  push:
    branches: [main]

permissions:
  contents: write
  # actions: write lets the GITHUB_TOKEN dispatch pi-images.yml
  # (gh workflow run) after cutting the release. Without it that step
  # 403s ("Resource not accessible by integration") and the release ships
  # with no flashable image.
  actions: write

# Increments patch on every push to main. Builds the Go camera binary
# for linux/arm64 + a Debian package wrapping it, attaches both to a
# fresh `vX.Y.Z` release. Pi cameras with auto-update enabled pull this
# on their next /api/v1/firmware/latest check.
#
# Major/minor bumps are operator-driven: locally `git tag v0.2.0 <sha>
# && git push --tags` then the next main push picks v0.2.1. No magic
# commit-message parsing — the human who decides a bump is significant
# pushes the tag.
jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          # Need full tag history so git tag -l can find the latest
          # semver tag. fetch-depth: 0 implies fetch-tags: true.
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      # Bump patch from the highest existing semver tag. Filter to bare
      # vMAJ.MIN.PAT — pre-release variants (vX.Y.Z-alpha, -rc.1, etc.)
      # don't count; release-ready builds only flow through this branch.
      # If no bare semver tag exists yet (fresh repo state) we seed at
      # v0.1.0 — small minor bump avoids the awkward v0.0.1 first release.
      - name: Compute next version
        id: ver
        run: |
          set -euo pipefail
          LATEST=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | head -1 || true)
          if [ -z "$LATEST" ]; then
            NEXT="v0.1.0"
            echo "No bare-semver tag yet, seeding at $NEXT"
          else
            IFS='.' read -r MAJ MIN PAT <<<"${LATEST#v}"
            NEXT="v${MAJ}.${MIN}.$((PAT+1))"
            echo "Latest: $LATEST -> Next: $NEXT"
          fi
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"

      # Static Go binary for the Pi (linux/arm64). Pure Go, no cgo;
      # build tags select real (vs synthetic) sensors. Same binary CI
      # smoke-builds.
      #
      # main.Version = the tag itself (e.g. v0.1.8). Camera self-update
      # compares its own Version against firmware:latest:version
      # (populated by the server's release webhook); inequality drives
      # updates regardless of semver ordering.
      - name: Build camera binary (linux/arm64, real sensors)
        env:
          VER: ${{ steps.ver.outputs.next }}
        run: |
          echo "building camera binary with main.Version=$VER"
          mkdir -p dist
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 \
            go build -trimpath -ldflags="-s -w -X main.Version=$VER" \
              -o dist/ghostcam-camera_arm64 ./camera

      - name: Package .deb (Go binary, no venv)
        env:
          VER: ${{ steps.ver.outputs.next }}
        run: |
          set -euo pipefail
          # Debian version uses bare semver; no tilde/pre-release suffix
          # since releases ship from real tags now.
          DEB_VERSION="${VER#v}"
          PKG_DIR="ghostcam-camera-build"
          mkdir -p "$PKG_DIR/DEBIAN" "$PKG_DIR/usr/local/bin" "$PKG_DIR/lib/systemd/system" "$PKG_DIR/lib/udev/rules.d" "$PKG_DIR/etc/polkit-1/rules.d"
          cp dist/ghostcam-camera_arm64 "$PKG_DIR/usr/local/bin/ghostcam-camera"
          chmod 755 "$PKG_DIR/usr/local/bin/ghostcam-camera"

          # Canonical unit file lives in pi/systemd/; the .deb installs
          # it to /lib/systemd/system so the package is self-contained
          # (apt install ./ghostcam-camera_*.deb produces a running service).
          cp pi/systemd/ghostcam-camera.service "$PKG_DIR/lib/systemd/system/ghostcam-camera.service"
          chmod 644 "$PKG_DIR/lib/systemd/system/ghostcam-camera.service"

          # GPS bring-up for the SIM7600 modem hat: a oneshot that powers
          # the GNSS engine via ModemManager and hands the NMEA port to
          # gpsd. Shipped in the .deb (not just the image) so already-
          # deployed cameras pick up fixes to GNSS bring-up via firmware
          # self-update instead of only on a reflash. postinst enables it;
          # /etc/default/gpsd is left to the gpsd package + image layer to
          # avoid a dpkg conffile conflict (the fix lives in the script,
          # which attaches the port at runtime regardless of that file).
          cp pi/image/files/ghostcam-enable-gps.sh "$PKG_DIR/usr/local/bin/ghostcam-enable-gps.sh"
          chmod 755 "$PKG_DIR/usr/local/bin/ghostcam-enable-gps.sh"
          cp pi/image/files/ghostcam-gps.service "$PKG_DIR/lib/systemd/system/ghostcam-gps.service"
          chmod 644 "$PKG_DIR/lib/systemd/system/ghostcam-gps.service"

          # Udev rule granting the `video` group access to /dev/dma_heap/*
          # for libcamera DMA buffer allocation from a non-root daemon.
          cp pi/debian/udev/60-ghostcam-camera.rules "$PKG_DIR/lib/udev/rules.d/60-ghostcam-camera.rules"
          chmod 644 "$PKG_DIR/lib/udev/rules.d/60-ghostcam-camera.rules"

          # Polkit rule granting `netdev` group blanket NetworkManager
          # access (required for unattended BT-onboarding's nmcli call).
          cp pi/debian/polkit/49-ghostcam-nm.rules "$PKG_DIR/etc/polkit-1/rules.d/49-ghostcam-nm.rules"
          chmod 644 "$PKG_DIR/etc/polkit-1/rules.d/49-ghostcam-nm.rules"

          # Polkit rule granting `netdev` the ModemManager Location action
          # so the non-root daemon can read `mmcli --location-get` (coarse
          # cell-tower geolocation / GPS fallback). Scoped to Location only.
          cp pi/debian/polkit/49-ghostcam-mm.rules "$PKG_DIR/etc/polkit-1/rules.d/49-ghostcam-mm.rules"
          chmod 644 "$PKG_DIR/etc/polkit-1/rules.d/49-ghostcam-mm.rules"

          # Maintainer scripts: postinst creates the ghostcam user, data
          # dir, env skeleton; enables + reloads the unit. prerm stops
          # the service on remove/upgrade. Both are idempotent and
          # chroot-safe (mmdebstrap image builds depend on this).
          cp pi/debian/postinst "$PKG_DIR/DEBIAN/postinst"
          cp pi/debian/prerm    "$PKG_DIR/DEBIAN/prerm"
          chmod 755 "$PKG_DIR/DEBIAN/postinst" "$PKG_DIR/DEBIAN/prerm"

          cat > "$PKG_DIR/DEBIAN/control" << EOF
          Package: ghostcam-camera
          Version: ${DEB_VERSION}
          Architecture: arm64
          Maintainer: Ghostcam <noreply@ghostcam.dev>
          Depends: ffmpeg, ca-certificates, adduser, network-manager, wpasupplicant, modemmanager, libqmi-utils, usb-modeswitch, gpsd, gpsd-clients, rpicam-apps, libzbar0, alsa-utils, bluez, rfkill, init-system-helpers
          Description: Ghostcam camera agent (Go)
           Captures video via rpicam-vid + ffmpeg, uploads HLS
           segments to S3 via presigned URLs, publishes live via
           WHIP/WebRTC to the broadcast hub.
          EOF
          sed -i 's/^          //' "$PKG_DIR/DEBIAN/control"
          dpkg-deb --build "$PKG_DIR" ghostcam-camera_arm64.deb

      # SBOM for the camera binary. cyclonedx-gomod walks the camera
      # module's import graph and emits a CycloneDX JSON file listing
      # every Go dependency with version + license. Shipped alongside
      # the .deb for supply-chain audits.
      - name: Generate camera SBOM (CycloneDX)
        run: |
          go install github.com/CycloneDX/cyclonedx-gomod/cmd/cyclonedx-gomod@latest
          "$(go env GOPATH)"/bin/cyclonedx-gomod app \
            -json -licenses -output ghostcam-camera.sbom.json -main camera .

      - name: Generate checksums
        run: sha256sum dist/ghostcam-camera_arm64 ghostcam-camera_*.deb ghostcam-camera.sbom.json > checksums.txt

      - name: Install gh CLI
        run: |
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          sudo apt-get update -qq && sudo apt-get install -y -qq gh

      # Tag the commit + cut the release. No force-move, no upsert;
      # every push gets a fresh tag and a fresh release page. If the
      # tag somehow already exists (rerun on same SHA), abort cleanly.
      - name: Tag + create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEXT: ${{ steps.ver.outputs.next }}
        run: |
          set -euo pipefail
          if git rev-parse --verify "refs/tags/$NEXT" >/dev/null 2>&1; then
            echo "Tag $NEXT already exists locally; rerun without a new commit?"
            exit 1
          fi
          if gh release view "$NEXT" >/dev/null 2>&1; then
            echo "Release $NEXT already exists on GitHub; rerun without a new commit?"
            exit 1
          fi
          git tag "$NEXT" "$GITHUB_SHA"
          git push origin "$NEXT"
          NOTES="Build from main at $(git rev-parse --short HEAD)."
          gh release create "$NEXT" \
            --title "$NEXT" \
            --notes "$NOTES" \
            dist/ghostcam-camera_arm64 \
            ghostcam-camera_*.deb \
            ghostcam-camera.sbom.json \
            checksums.txt

      # Kick off the flashable Pi image build for this release.
      #
      # pi-images.yml also has a `release: published` trigger, but that
      # does NOT fire here: this release was created with GITHUB_TOKEN, and
      # events triggered by GITHUB_TOKEN don't start new workflow runs — so
      # without this step every release would ship a .deb but no image (the
      # exact gap that left prod serving a stale, non-booting image). The
      # ONE exception to that rule is workflow_dispatch, which is precisely
      # what `gh workflow run` uses, so this dispatch does start the build.
      # The image job then attaches the .img.xz and nudges the server to
      # ingest it. The release-event trigger stays as a fallback for
      # human/PAT-published releases.
      - name: Trigger Pi image build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEXT: ${{ steps.ver.outputs.next }}
        run: gh workflow run pi-images.yml -f version="$NEXT"
