app = "ghostcam"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile"
  target = "server-multi"

[env]
  GHOSTCAM_PUBLIC_IP = "0.0.0.0"
  RUST_LOG = "server_multi=info,server_core=info,str0m=warn"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

[[services]]
  protocol = "udp"
  internal_port = 4433
  [[services.ports]]
    port = 4433

[checks]
  [checks.health]
    type = "http"
    port = 3000
    path = "/healthz"
    interval = "10s"
    timeout = "5s"
