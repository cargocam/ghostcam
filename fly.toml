app = "ghostcam"
primary_region = "sea"

[build]
  dockerfile = "Dockerfile"
  target = "server"

[mounts]
  source = "ghostcam_data"
  destination = "/var/ghostcam"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

[checks]
  [checks.health]
    type = "http"
    port = 3000
    path = "/healthz"
    interval = "10s"
    timeout = "5s"
