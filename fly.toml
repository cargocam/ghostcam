app = "ghostcam"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"
  target = "server"

[mounts]
  source = "ghostcam_data"
  destination = "/var/ghostcam"

[env]
  # Soft cap that nudges Go's GC to return pages to the OS more
  # aggressively as RSS approaches the limit. Sized to leave headroom
  # for ~40 MiB steady-state + bounded argon2 spikes (2 × 64 MiB via
  # the auth-package semaphore) inside a 256 MiB Fly machine. See
  # GH #56.
  GOMEMLIMIT = "200MiB"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

# WebRTC ICE-lite UDP — requires dedicated IPv4 (shared_v4 is TCP-only).
# Pion binds to 0.0.0.0:50000-50200 (SetEphemeralUDPPortRange).
[[services]]
  internal_port = 50000
  protocol = "udp"
  [[services.ports]]
    port = 50000

[checks]
  [checks.health]
    type = "http"
    port = 3000
    path = "/healthz"
    interval = "10s"
    timeout = "5s"
