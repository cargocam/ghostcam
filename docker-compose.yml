services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ghostcam
      POSTGRES_USER: ghostcam
      POSTGRES_PASSWORD: dev-password
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  server:
    build:
      context: .
      target: server
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "4433:4433/udp"
      - "3478:3478/udp"
    depends_on: [postgres, redis]
    environment:
      - GHOSTCAM_PUBLIC_IP=${GHOSTCAM_PUBLIC_IP:-}
      - GHOSTCAM_WEBRTC_PORT=3478
      - GHOSTCAM_DATABASE_URL=postgres://ghostcam:dev-password@postgres:5432/ghostcam
      - GHOSTCAM_REDIS_URL=redis://redis:6379
      - GHOSTCAM_DATA_DIR=/var/ghostcam
      - GHOSTCAM_ADMIN_EMAIL=admin@ghostcam.dev
      - GHOSTCAM_ADMIN_PASSWORD=dev-password
      - GHOSTCAM_ENROLLMENT_ADDR=${GHOSTCAM_PUBLIC_IP:-server}:4433
      - RUST_LOG=server=info
      # Billing — set Stripe keys in .env (see .env.example)
      - STRIPE_PUBLIC_KEY=${STRIPE_PUBLIC_KEY:-}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_PRICING_TABLE_ID=${STRIPE_PRICING_TABLE_ID:-}
      - STRIPE_PORTAL_CONFIG_ID=${STRIPE_PORTAL_CONFIG_ID:-}
    volumes:
      - server-data:/var/ghostcam

  camera-1:
    profiles: [test]
    build:
      context: .
      target: camera
    restart: unless-stopped
    depends_on: [server]
    environment:
      - GHOSTCAM_ADMIN_EMAIL=admin@ghostcam.dev
      - GHOSTCAM_ADMIN_PASSWORD=dev-password
      - GHOSTCAM_CAMERA_NAME=Front Door
      - GHOSTCAM_DATA_DIR=/var/ghostcam
      - GHOSTCAM_SERVER_HTTP=http://server:3000
      - RUST_LOG=camera=info
    volumes:
      - camera-1-data:/var/ghostcam
    command: ["--test-source", "--server-addr", "server:4433", "--no-tofu"]

  camera-2:
    profiles: [test]
    build:
      context: .
      target: camera
    restart: unless-stopped
    depends_on: [server]
    environment:
      - GHOSTCAM_ADMIN_EMAIL=admin@ghostcam.dev
      - GHOSTCAM_ADMIN_PASSWORD=dev-password
      - GHOSTCAM_CAMERA_NAME=Garage
      - GHOSTCAM_DATA_DIR=/var/ghostcam
      - GHOSTCAM_SERVER_HTTP=http://server:3000
      - RUST_LOG=camera=info
    volumes:
      - camera-2-data:/var/ghostcam
    command: ["--test-source", "--server-addr", "server:4433", "--no-tofu"]

  camera-3:
    profiles: [test]
    build:
      context: .
      target: camera
    restart: unless-stopped
    depends_on: [server]
    environment:
      - GHOSTCAM_ADMIN_EMAIL=admin@ghostcam.dev
      - GHOSTCAM_ADMIN_PASSWORD=dev-password
      - GHOSTCAM_CAMERA_NAME=Backyard
      - GHOSTCAM_DATA_DIR=/var/ghostcam
      - GHOSTCAM_SERVER_HTTP=http://server:3000
      - RUST_LOG=camera=info
    volumes:
      - camera-3-data:/var/ghostcam
    command: ["--test-source", "--server-addr", "server:4433", "--no-tofu"]

  ui:
    build:
      context: .
      target: ui-dev
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on: [server]
    environment:
      - VITE_API_URL=http://server:3000
    volumes:
      - ./ui/src:/app/src

  # Stripe CLI webhook forwarder.
  # Exits immediately if STRIPE_SECRET_KEY is not set in the host env.
  # Prints the webhook signing secret (whsec_...) to stdout on startup —
  # set it as STRIPE_WEBHOOK_SECRET in .env and restart the server.
  stripe-webhooks:
    image: stripe/stripe-cli:latest
    depends_on: [server]
    environment:
      - STRIPE_API_KEY=${STRIPE_SECRET_KEY:-}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        if [ -z "$$STRIPE_API_KEY" ]; then
          echo "STRIPE_SECRET_KEY not set, skipping webhook forwarder"
          exit 0
        fi
        exec stripe listen --forward-to http://server:3000/api/v1/webhooks/stripe --log-level warn
    restart: "no"

volumes:
  pg-data:
  redis-data:
  server-data:
  camera-1-data:
  camera-2-data:
  camera-3-data:
