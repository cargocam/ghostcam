services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ghostcam
      POSTGRES_USER: ghostcam
      POSTGRES_PASSWORD: dev-password
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mc alias set local http://minio:9000 minioadmin minioadmin
        mc mb --ignore-existing local/ghostcam-segments
        exit 0
    restart: "no"

  server:
    build:
      context: .
      target: server
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on: [postgres, redis, minio-init]
    environment:
      - GHOSTCAM_DATABASE_URL=postgres://ghostcam:dev-password@postgres:5432/ghostcam
      - GHOSTCAM_REDIS_URL=redis://redis:6379
      - GHOSTCAM_DATA_DIR=/var/ghostcam
      - GHOSTCAM_ADMIN_EMAIL=admin@ghostcam.dev
      - GHOSTCAM_ADMIN_PASSWORD=dev-password
      - RUST_LOG=server=info
      # S3 / MinIO (local dev)
      # Use host.docker.internal so presigned URLs are routable from both
      # the browser (via localhost:9000) and the Pi (via LAN IP:9000).
      - GHOSTCAM_S3_BUCKET=ghostcam-segments
      - GHOSTCAM_S3_ENDPOINT=http://${GHOSTCAM_PUBLIC_IP:-host.docker.internal}:9000
      - GHOSTCAM_S3_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      # Billing — set Stripe keys in .env (see .env.example)
      - STRIPE_PUBLIC_KEY=${STRIPE_PUBLIC_KEY:-}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_PRICING_TABLE_ID=${STRIPE_PRICING_TABLE_ID:-}
      - STRIPE_PORTAL_CONFIG_ID=${STRIPE_PORTAL_CONFIG_ID:-}
    volumes:
      - server-data:/var/ghostcam

  # Test cameras use --test-source for synthetic video/audio.
  # In the new HLS architecture, cameras provision via QR or pre-provisioned tokens.
  # For Docker dev, the entrypoint writes a server_url file so the camera can connect.
  camera-1:
    profiles: [test]
    build:
      context: .
      target: camera
    restart: unless-stopped
    depends_on: [server]
    environment:
      - GHOSTCAM_DATA_DIR=/var/ghostcam
      - GHOSTCAM_SERVER_ADDR=server:4433
      - RUST_LOG=camera=info
    volumes:
      - camera-1-data:/var/ghostcam
    command: ["--test-source"]

  camera-2:
    profiles: [test]
    build:
      context: .
      target: camera
    restart: unless-stopped
    depends_on: [server]
    environment:
      - GHOSTCAM_DATA_DIR=/var/ghostcam
      - GHOSTCAM_SERVER_ADDR=server:4433
      - RUST_LOG=camera=info
    volumes:
      - camera-2-data:/var/ghostcam
    command: ["--test-source"]

  camera-3:
    profiles: [test]
    build:
      context: .
      target: camera
    restart: unless-stopped
    depends_on: [server]
    environment:
      - GHOSTCAM_DATA_DIR=/var/ghostcam
      - GHOSTCAM_SERVER_ADDR=server:4433
      - RUST_LOG=camera=info
    volumes:
      - camera-3-data:/var/ghostcam
    command: ["--test-source"]

  ui:
    build:
      context: .
      target: ui-dev
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on: [server]
    environment:
      - VITE_API_URL=http://server:3000
    volumes:
      - ./ui/src:/app/src

  # Stripe CLI webhook forwarder.
  # Exits immediately if STRIPE_SECRET_KEY is not set in the host env.
  # Prints the webhook signing secret (whsec_...) to stdout on startup —
  # set it as STRIPE_WEBHOOK_SECRET in .env and restart the server.
  stripe-webhooks:
    image: stripe/stripe-cli:latest
    depends_on: [server]
    environment:
      - STRIPE_API_KEY=${STRIPE_SECRET_KEY:-}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        if [ -z "$$STRIPE_API_KEY" ]; then
          echo "STRIPE_SECRET_KEY not set, skipping webhook forwarder"
          exit 0
        fi
        exec stripe listen --forward-to http://server:3000/api/v1/webhooks/stripe --log-level warn
    restart: "no"

volumes:
  pg-data:
  redis-data:
  minio-data:
  server-data:
  camera-1-data:
  camera-2-data:
  camera-3-data:
