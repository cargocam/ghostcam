services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ghostcam
      POSTGRES_USER: ghostcam
      POSTGRES_PASSWORD: dev-password
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mc alias set local http://minio:9000 minioadmin minioadmin
        mc mb --ignore-existing local/ghostcam-segments
        exit 0
    restart: "no"

  server:
    build:
      context: .
      target: server-dev
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "50000-50200:50000-50200/udp"  # WebRTC ICE-lite UDP range
    depends_on: [postgres, redis, minio-init]
    environment:
      - GHOSTCAM_DATABASE_URL=postgres://ghostcam:dev-password@postgres:5432/ghostcam
      - GHOSTCAM_REDIS_URL=redis://redis:6379
      - GHOSTCAM_DATA_DIR=/var/ghostcam
      - GHOSTCAM_ADMIN_EMAIL=admin@ghostcam.dev
      - GHOSTCAM_ADMIN_PASSWORD=dev-password
      # S3 / MinIO (local dev)
      - GHOSTCAM_S3_BUCKET=ghostcam-segments
      # GHOSTCAM_PUBLIC_IP must be set to LAN IP for presigned URLs to work
      # from both Docker containers and the browser.
      # macOS: export GHOSTCAM_PUBLIC_IP=$(ipconfig getifaddr en0)
      - GHOSTCAM_S3_ENDPOINT=http://${GHOSTCAM_PUBLIC_IP:?Set GHOSTCAM_PUBLIC_IP to your LAN IP}:9000
      - GHOSTCAM_S3_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      # Public IP for WebRTC ICE-lite candidate (same IP used for MinIO presigned URLs)
      - GHOSTCAM_PUBLIC_IP=${GHOSTCAM_PUBLIC_IP:?Set GHOSTCAM_PUBLIC_IP to your LAN IP}
      # Stripe — required for billing/tier enforcement.
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:?Set STRIPE_SECRET_KEY in .env}
      - STRIPE_PORTAL_CONFIG_ID=${STRIPE_PORTAL_CONFIG_ID:-}
      # GitHub webhook (optional — Pi image auto-publishing from releases)
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      # Resend (optional — email logged to stdout when unset)
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL:-}
      - RESEND_REPLY_TO=${RESEND_REPLY_TO:-}
    volumes:
      - server-data:/var/ghostcam
      # Source bind-mount for `air` hot-reload. Save a .go file → air
      # rebuilds + restarts the server (~1-2s). The named-volume Go
      # caches survive container rebuilds.
      - ./:/app
      - server-go-build-cache:/root/.cache/go-build
      - server-go-mod-cache:/root/go/pkg/mod

  ui:
    build:
      context: .
      target: ui-dev
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on: [server]
    environment:
      - VITE_API_URL=http://server:3000
    volumes:
      - ./ui/src:/app/src
      - ./ui/public:/app/public
      - ./ui/index.html:/app/index.html

  camera-1:
    profiles: [test]
    build:
      context: .
      target: camera
    restart: unless-stopped
    depends_on: [server]
    environment:
      - GHOSTCAM_DATA_DIR=/var/ghostcam
      - GHOSTCAM_SERVER_URL=http://server:3000
      - GHOSTCAM_ADMIN_EMAIL=admin@ghostcam.dev
      - GHOSTCAM_ADMIN_PASSWORD=dev-password
      # Force continuous recording for the test stack so the e2e HLS
      # manifest test sees segments. The server-side default for new
      # cameras is "never" (streaming-only); test cameras need to
      # actively upload segments for the HLS/timeline tests to pass.
      - GHOSTCAM_RECORDING_MODE=constant
      - TZ=${TZ:-America/Los_Angeles}
    volumes:
      - camera-1-data:/var/ghostcam
    command: ["--test-source"]

  camera-2:
    profiles: [test]
    build:
      context: .
      target: camera
    restart: unless-stopped
    depends_on: [server]
    environment:
      - GHOSTCAM_DATA_DIR=/var/ghostcam
      - GHOSTCAM_SERVER_URL=http://server:3000
      - GHOSTCAM_ADMIN_EMAIL=admin@ghostcam.dev
      - GHOSTCAM_ADMIN_PASSWORD=dev-password
      # Force continuous recording for the test stack so the e2e HLS
      # manifest test sees segments. The server-side default for new
      # cameras is "never" (streaming-only); test cameras need to
      # actively upload segments for the HLS/timeline tests to pass.
      - GHOSTCAM_RECORDING_MODE=constant
      - TZ=${TZ:-America/Los_Angeles}
    volumes:
      - camera-2-data:/var/ghostcam
    command: ["--test-source"]

  camera-3:
    profiles: [test]
    build:
      context: .
      target: camera
    restart: unless-stopped
    depends_on: [server]
    environment:
      - GHOSTCAM_DATA_DIR=/var/ghostcam
      - GHOSTCAM_SERVER_URL=http://server:3000
      - GHOSTCAM_ADMIN_EMAIL=admin@ghostcam.dev
      - GHOSTCAM_ADMIN_PASSWORD=dev-password
      # Force continuous recording for the test stack so the e2e HLS
      # manifest test sees segments. The server-side default for new
      # cameras is "never" (streaming-only); test cameras need to
      # actively upload segments for the HLS/timeline tests to pass.
      - GHOSTCAM_RECORDING_MODE=constant
      - TZ=${TZ:-America/Los_Angeles}
    volumes:
      - camera-3-data:/var/ghostcam
    command: ["--test-source"]

  # Local dev optimization: drop docker/test-loop.mp4 into the repo and add
  # a docker-compose.override.yml that bind-mounts it into each camera's
  # /var/ghostcam/test-loop.mp4. The camera will prefer it over ffmpeg's
  # CPU-intensive testsrc2 filter. CI deliberately does NOT mount this
  # file — the file is .gitignored so a committed bind mount would create
  # an empty directory at the host path on a fresh checkout, which then
  # mounts as a directory inside the container and crashes ffmpeg.

  stripe-webhooks:
    image: stripe/stripe-cli:latest
    restart: unless-stopped
    depends_on: [server]
    command:
      - listen
      - --forward-to
      - http://server:3000/api/v1/webhooks/stripe
      - --api-key
      - ${STRIPE_SECRET_KEY:?Set STRIPE_SECRET_KEY in .env}
    environment:
      - STRIPE_CLI_TELEMETRY_OPTOUT=1

  # Self-hosted GitHub Actions runner. Requires GITHUB_RUNNER_TOKEN in .env
  # (generate at repo Settings → Actions → Runners → New self-hosted runner).
  actions-runner:
    image: ghcr.io/actions/actions-runner:latest
    restart: unless-stopped
    profiles: [runner]
    working_dir: /home/runner
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        sudo chown -R runner:runner /home/runner/_work
        if [ ! -f /home/runner/.runner ]; then
          ./config.sh --url https://github.com/cargocam/ghostcam \
            --token "$GITHUB_RUNNER_TOKEN" \
            --name ghostcam-dev \
            --labels self-hosted,linux \
            --replace --unattended
        fi
        ./run.sh
    environment:
      - GITHUB_RUNNER_TOKEN=${GITHUB_RUNNER_TOKEN:-}
    volumes:
      - runner-data:/home/runner/_work
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  pg-data:
  redis-data:
  minio-data:
  server-data:
  server-go-build-cache:
  server-go-mod-cache:
  camera-1-data:
  camera-2-data:
  camera-3-data:
  runner-data:
