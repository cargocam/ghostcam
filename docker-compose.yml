services:
  bridge:
    build:
      context: .
      dockerfile: Dockerfile
      target: bridge
    ports:
      - "4433:4433/udp"
      - "3000:3000"
    environment:
      - GHOSTCAM_API_KEY=dev-key
      - RUST_LOG=server=info,str0m=warn
    command: >
      server
        --quic-port 4433
        --http-port 3000
        --public-ip 127.0.0.1
        --viewer-dir /app/ui

  camera-1:
    build:
      context: .
      dockerfile: Dockerfile
      target: agent
    depends_on:
      - bridge
    environment:
      - RUST_LOG=camera=info
    command: >
      camera
        --test-source
        --bridge-addr bridge:4433
        --device-id cam-01
        --group-id default
        --test-file /app/test-data/test.h264
        --fps 30

  camera-2:
    build:
      context: .
      dockerfile: Dockerfile
      target: agent
    depends_on:
      - bridge
    environment:
      - RUST_LOG=camera=info
    command: >
      camera
        --test-source
        --bridge-addr bridge:4433
        --device-id cam-02
        --group-id default
        --test-file /app/test-data/test.h264
        --fps 30
