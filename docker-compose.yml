services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ghostcam
      POSTGRES_USER: ghostcam
      POSTGRES_PASSWORD: dev-password
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mc alias set local http://minio:9000 minioadmin minioadmin
        mc mb --ignore-existing local/ghostcam-segments
        exit 0
    restart: "no"

  server:
    build:
      context: .
      target: server
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on: [postgres, redis, minio-init]
    environment:
      - GHOSTCAM_DATABASE_URL=postgres://ghostcam:dev-password@postgres:5432/ghostcam
      - GHOSTCAM_REDIS_URL=redis://redis:6379
      - GHOSTCAM_DATA_DIR=/var/ghostcam
      - GHOSTCAM_ADMIN_EMAIL=admin@ghostcam.dev
      - GHOSTCAM_ADMIN_PASSWORD=dev-password
      # S3 / MinIO (local dev)
      - GHOSTCAM_S3_BUCKET=ghostcam-segments
      # GHOSTCAM_PUBLIC_IP must be set to LAN IP for presigned URLs to work
      # from both Docker containers and the browser.
      # macOS: export GHOSTCAM_PUBLIC_IP=$(ipconfig getifaddr en0)
      - GHOSTCAM_S3_ENDPOINT=http://${GHOSTCAM_PUBLIC_IP:?Set GHOSTCAM_PUBLIC_IP to your LAN IP}:9000
      - GHOSTCAM_S3_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
    volumes:
      - server-data:/var/ghostcam

  ui:
    build:
      context: .
      target: ui-dev
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on: [server]
    environment:
      - VITE_API_URL=http://server:3000
    volumes:
      - ./ui/src:/app/src

  camera-1:
    profiles: [test]
    build:
      context: .
      target: camera
    restart: unless-stopped
    depends_on: [server]
    environment:
      - GHOSTCAM_DATA_DIR=/var/ghostcam
      - GHOSTCAM_SERVER_URL=http://server:3000
      - GHOSTCAM_ADMIN_EMAIL=admin@ghostcam.dev
      - GHOSTCAM_ADMIN_PASSWORD=dev-password
    volumes:
      - camera-1-data:/var/ghostcam
    command: ["--test-source"]

  camera-2:
    profiles: [test]
    build:
      context: .
      target: camera
    restart: unless-stopped
    depends_on: [server]
    environment:
      - GHOSTCAM_DATA_DIR=/var/ghostcam
      - GHOSTCAM_SERVER_URL=http://server:3000
      - GHOSTCAM_ADMIN_EMAIL=admin@ghostcam.dev
      - GHOSTCAM_ADMIN_PASSWORD=dev-password
    volumes:
      - camera-2-data:/var/ghostcam
    command: ["--test-source"]

volumes:
  pg-data:
  redis-data:
  minio-data:
  server-data:
  camera-1-data:
  camera-2-data:
