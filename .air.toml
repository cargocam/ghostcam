root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/ghostcam-server ./server"
  bin = "./tmp/ghostcam-server"
  include_ext = ["go"]
  exclude_dir = [".git", ".github", ".idea", ".vscode", "camera", "dist", "docker", "docs", "infra", "node_modules", "pi", "scripts", "tmp", "ui"]
  exclude_regex = ["_test\\.go$"]
  delay = 500
  kill_delay = "2s"
  stop_on_error = true
  send_interrupt = true

[log]
  time = true

[misc]
  clean_on_exit = true
